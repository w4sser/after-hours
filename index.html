<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>After Hours — For Two</title>
<meta name="description" content="A premium card game for couples. Stop scrolling. Start laughing.">
<meta name="theme-color" content="#0D0D0D">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  background: linear-gradient(165deg, #0D0D0D 0%, #1A1A2E 50%, #16213E 100%);
  color: #F0E6D3;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}
#app {
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
  overflow-y: auto;
}
button { font-family: inherit; cursor: pointer; -webkit-appearance: none; }
button:active { transform: scale(0.97); }

/* Screens */
.screen { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; }
.screen.hidden { display: none; }

/* Home */
.home-subtitle { font-size: 13px; letter-spacing: 6px; text-transform: uppercase; color: #8B7E74; margin-bottom: 12px; }
.home-title { font-size: 42px; font-weight: 300; letter-spacing: -1px; line-height: 1.1; color: #F0E6D3; }
.home-tagline { font-size: 15px; color: #8B7E74; margin-top: 16px; line-height: 1.5; font-weight: 300; }
.mood-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #6B5F54; text-align: center; margin: 32px 0 12px; }
.mood-btn {
  width: 100%; padding: 18px 24px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; color: #F0E6D3; font-size: 16px;
  display: flex; align-items: center; gap: 16px;
  text-align: left; margin-bottom: 10px;
  transition: background 0.2s, border-color 0.2s;
}
.mood-btn:hover, .mood-btn:focus { background: rgba(255,255,255,0.08); }
.mood-btn .emoji { font-size: 24px; flex-shrink: 0; }
.mood-btn .info .name { font-weight: 500; font-size: 16px; }
.mood-btn .info .desc { font-size: 13px; color: #8B7E74; margin-top: 2px; }
.mood-btn .count { margin-left: auto; font-size: 13px; color: #6B5F54; flex-shrink: 0; }
.home-footer { font-size: 11px; color: #4A4440; text-align: center; line-height: 1.6; margin-top: 24px; }
.lang-toggle {
  position: fixed; top: 16px; right: 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 8px 14px;
  color: #8B7E74; font-size: 13px; font-weight: 500;
  z-index: 10; letter-spacing: 0.5px;
  transition: background 0.2s;
}
.lang-toggle:hover { background: rgba(255,255,255,0.1); }

/* Play */
.play-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; }
.play-exit { background: none; border: none; color: #6B5F54; font-size: 14px; padding: 8px 0; }
.play-counter { font-size: 13px; color: #6B5F54; }
.play-mood { font-size: 13px; opacity: 0.7; }
.card-container {
  width: 100%; min-height: 380px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 24px; padding: 36px 28px;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative; overflow: hidden;
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.card-container.animating { opacity: 0; transform: translateX(30px); }
.card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 24px 24px 0 0; }
.card-type-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.card-type-icon { font-size: 20px; }
.card-type-label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; }
.card-hint { font-size: 11px; color: #6B5F54; margin: 0 0 0 30px; font-style: italic; }
.card-text { font-size: 22px; font-weight: 400; line-height: 1.5; text-align: center; padding: 0 8px; letter-spacing: -0.3px; }
.action-row { display: flex; gap: 12px; width: 100%; margin-top: 20px; }
.btn-reveal, .btn-next {
  flex: 1; padding: 16px; border-radius: 14px;
  font-size: 15px; font-weight: 500;
}
.btn-next {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #F0E6D3;
  transition: background 0.2s;
}
.btn-next:hover { background: rgba(255,255,255,0.1); }
.btn-reveal { border: none; }
.guess-hint { font-size: 12px; text-align: center; margin-top: 8px; opacity: 0.7; }
.progress-track { width: 100%; height: 2px; background: rgba(255,255,255,0.04); border-radius: 1px; margin-top: 16px; }
.progress-bar { height: 100%; border-radius: 1px; transition: width 0.4s ease; }

/* Done */
.done-icon { font-size: 48px; margin-bottom: 8px; }
.done-title { font-size: 28px; font-weight: 300; letter-spacing: -0.5px; margin-bottom: 12px; }
.done-sub { font-size: 15px; color: #8B7E74; line-height: 1.6; }
.done-actions { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: 32px; }
.btn-replay {
  width: 100%; padding: 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px; color: #F0E6D3;
  font-size: 15px; font-weight: 500;
}
.btn-home {
  width: 100%; padding: 16px;
  background: none;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; color: #8B7E74; font-size: 15px;
}
</style>
</head>
<body>

    <div class="action-row">
      <button class="btn-reveal hidden" id="revealBtn" onclick="reveal()"></button>
      <button class="btn-next" id="nextBtn" onclick="nextCard()"></button>
    </div>
    <p class="guess-hint hidden" id="guessHint"></p>
    <div class="progress-track">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <!-- Done Screen -->
  <div class="screen hidden" id="doneScreen">
    <div class="done-icon">&#10024;</div>
    <h2 class="done-title" id="doneTitle"></h2>
    <p class="done-sub" id="doneSub"></p>
    <div class="done-actions">
      <button class="btn-replay" id="replayBtn" onclick="replay()"></button>
      <button class="btn-home" id="newMoodBtn" onclick="goHome()"></button>
    </div>
  </div>
</div>

var MOOD_COLORS = { fun:"#FFB347", deep:"#7EC8E3", spicy:"#FF6B6B", mix:"#C9A0DC" };

// ─── STATE ───
var currentMood = null;
var deck = [];
var idx = 0;
var revealed = false;

function t() { return UI[lang]; }
function cardText(card) { return card[lang]; }

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// ─── SCREENS ───
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.add('hidden'); });
  document.getElementById(id).classList.remove('hidden');
}

function toggleLang() {
  lang = lang === "en" ? "sv" : "en";
  document.getElementById('langBtn').textContent = lang === "en" ? "SV" : "EN";
  // Re-render current screen
  if (!document.getElementById('homeScreen').classList.contains('hidden')) renderHome();
  if (!document.getElementById('playScreen').classList.contains('hidden')) renderCard();
  if (!document.getElementById('doneScreen').classList.contains('hidden')) renderDone();
}

// ─── HOME ───
function renderHome() {
  var u = t();
  document.getElementById('tagline').textContent = u.tagline;
  document.getElementById('moodLabel').textContent = u.moodLabel;
  document.getElementById('homeFooter').textContent = u.footer;

  var html = "";
  var moodKeys = ["fun","deep","spicy","mix"];
  for (var i = 0; i < moodKeys.length; i++) {
    var key = moodKeys[i];
    var m = u.moods[key];
    var count = key === "mix" ? CARDS.length : CARDS.filter(function(c){ return c.mood === key; }).length;
    html += '<button class="mood-btn" onclick="startGame(\'' + key + '\')">';
    html += '<span class="emoji">' + m.emoji + '</span>';
    html += '<div class="info"><div class="name">' + m.label + '</div><div class="desc">' + m.desc + '</div></div>';
    html += '<span class="count">' + count + ' ' + u.cards + '</span>';
    html += '</button>';
  }
  document.getElementById('moodButtons').innerHTML = html;
}

function goHome() {
  renderHome();
  showScreen('homeScreen');
}

// ─── PLAY ───
function startGame(mood) {
  currentMood = mood;
  var filtered = mood === "mix" ? CARDS : CARDS.filter(function(c){ return c.mood === mood; });
  deck = shuffle(filtered);
  idx = 0;
  revealed = false;
  renderCard();
  showScreen('playScreen');
}

function renderCard() {
  var u = t();
  var card = deck[idx];
  var meta = u.types[card.type];
  var color = MOOD_COLORS[currentMood];
  var moodInfo = u.moods[currentMood] || u.moods.mix;
  var isGuess = card.type === "guess_your_partner";

  document.getElementById('exitBtn').innerHTML = u.exit;
  document.getElementById('counter').textContent = (idx + 1) + " / " + deck.length;
  document.getElementById('playMoodLabel').textContent = moodInfo.emoji + " " + moodInfo.label;
  document.getElementById('playMoodLabel').style.color = color;

  document.getElementById('cardAccent').style.background = "linear-gradient(90deg, " + color + "88, transparent)";
  document.getElementById('typeIcon').textContent = meta.icon;
  document.getElementById('typeLabel').textContent = meta.label;
  document.getElementById('typeLabel').style.color = color;
  document.getElementById('typeHint').textContent = meta.hint;
  document.getElementById('cardText').textContent = cardText(card);

  var revealBtn = document.getElementById('revealBtn');
  var nextBtn = document.getElementById('nextBtn');
  var guessHint = document.getElementById('guessHint');

  if (isGuess && !revealed) {
    revealBtn.classList.remove('hidden');
    revealBtn.textContent = u.reveal;
    revealBtn.style.background = "linear-gradient(135deg, " + color + "33, " + color + "18)";
    revealBtn.style.color = color;
    nextBtn.classList.add('hidden');
    guessHint.classList.remove('hidden');
    guessHint.textContent = u.guessWait;
    guessHint.style.color = "#6B5F54";
  } else {
    revealBtn.classList.add('hidden');
    nextBtn.classList.remove('hidden');
    nextBtn.textContent = u.next;
    if (isGuess && revealed) {
      guessHint.classList.remove('hidden');
      guessHint.textContent = u.guessReveal;
      guessHint.style.color = color;
    } else {
      guessHint.classList.add('hidden');
    }
  }

  var pct = ((idx + 1) / deck.length * 100);
  var bar = document.getElementById('progressBar');
  bar.style.width = pct + "%";
  bar.style.background = "linear-gradient(90deg, " + color + "66, " + color + "33)";
}

function reveal() {
  revealed = true;
  renderCard();
}

function nextCard() {
  if (idx + 1 >= deck.length) {
    renderDone();
    showScreen('doneScreen');
    return;
  }
  // Animate
  var container = document.getElementById('cardContainer');
  container.classList.add('animating');
  setTimeout(function(){
    idx++;
    revealed = false;
    renderCard();
    container.classList.remove('animating');
  }, 200);
}

// ─── DONE ───
function renderDone() {
  var u = t();
  var moodInfo = u.moods[currentMood] || u.moods.mix;
  document.getElementById('doneTitle').textContent = u.doneTitle;
  document.getElementById('doneSub').textContent = u.doneSub(deck.length);
  document.getElementById('replayBtn').textContent = u.replay(moodInfo.label);
  document.getElementById('newMoodBtn').textContent = u.newMood;
}

function replay() {
  startGame(currentMood);
}

// ─── INIT ───
renderHome();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>After Hours</title>
<meta name="description" content="A card game for couples. Stop scrolling. Start laughing.">
<meta name="theme-color" content="#111111">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  background: #111111;
  color: #EDE0C8;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  overflow: hidden;
}
#app {
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px;
  overflow-y: auto;
}
button { font-family: inherit; cursor: pointer; -webkit-appearance: none; border: none; }
button:active { transform: scale(0.97); transition: transform 0.1s; }
.screen { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; }
.screen.hidden { display: none; }

/* ── LANG TOGGLE ── */
.lang-toggle {
  position: fixed; top: 20px; right: 20px;
  background: rgba(237,224,200,0.08);
  border: 1px solid rgba(237,224,200,0.15);
  border-radius: 8px; padding: 7px 13px;
  color: #9A8E7E; font-size: 12px; font-weight: 500;
  letter-spacing: 1px; z-index: 100;
  transition: background 0.2s;
}
.lang-toggle:hover { background: rgba(237,224,200,0.13); }

/* ── HOME ── */
.home-title {
  font-family: 'Anton', sans-serif;
  font-size: clamp(52px, 16vw, 80px);
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #EDE0C8;
  text-align: center;
  line-height: 1;
  margin-bottom: 14px;
}
.home-subtitle {
  font-size: 15px;
  font-weight: 300;
  color: #9A8E7E;
  text-align: center;
  line-height: 1.6;
  max-width: 280px;
  margin-bottom: 40px;
}
.card-fan {
  width: 180px;
  height: 160px;
  position: relative;
  margin-bottom: 44px;
  flex-shrink: 0;
}
.card-fan svg { width: 100%; height: 100%; }
.btn-start {
  width: 100%;
  padding: 20px;
  background: #EDE0C8;
  border-radius: 50px;
  color: #111111;
  font-family: 'Anton', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 28px;
  transition: background 0.2s, transform 0.1s;
}
.btn-start:hover { background: #F5EDD8; }
.home-nav {
  display: flex; gap: 28px;
  font-size: 11px; letter-spacing: 2px;
  text-transform: uppercase; color: #6B5F52;
}
.home-nav button {
  background: none; color: #6B5F52;
  font-size: 11px; letter-spacing: 2px;
  text-transform: uppercase; font-family: inherit;
  padding: 4px 0;
  transition: color 0.2s;
}
.home-nav button:hover { color: #9A8E7E; }

/* ── MOOD SELECT ── */
.mood-back {
  align-self: flex-start;
  background: none; color: #6B5F52;
  font-size: 13px; padding: 0 0 24px 0;
  display: flex; align-items: center; gap: 6px;
}
.mood-heading {
  font-family: 'Anton', sans-serif;
  font-size: 32px; letter-spacing: 1px;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 6px;
}
.mood-desc {
  font-size: 13px; color: #9A8E7E;
  text-align: center; margin-bottom: 32px;
}
.mood-btn {
  width: 100%; padding: 18px 20px;
  background: rgba(237,224,200,0.04);
  border: 1px solid rgba(237,224,200,0.08);
  border-radius: 14px;
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 10px; text-align: left;
  transition: background 0.2s, border-color 0.2s;
}
.mood-btn:hover { background: rgba(237,224,200,0.08); }
.mood-btn .m-emoji { font-size: 22px; flex-shrink: 0; }
.mood-btn .m-info .m-name {
  font-family: 'Anton', sans-serif;
  font-size: 18px; letter-spacing: 1px;
  text-transform: uppercase; color: #EDE0C8;
}
.mood-btn .m-info .m-desc { font-size: 12px; color: #7A6E62; margin-top: 2px; }
.mood-btn .m-count { margin-left: auto; font-size: 12px; color: #6B5F52; flex-shrink: 0; }

/* ── PLAY ── */
.play-header {
  display: flex; justify-content: space-between;
  align-items: center; width: 100%; margin-bottom: 20px;
}
.play-exit {
  background: none; color: #6B5F52; font-size: 13px;
  padding: 8px 0; display: flex; align-items: center; gap: 4px;
}
.play-counter { font-size: 12px; color: #6B5F52; letter-spacing: 1px; }
.play-mood-tag {
  font-size: 12px; letter-spacing: 1px;
  opacity: 0.8; text-transform: uppercase;
}
.card-box {
  width: 100%; min-height: 360px;
  background: #1A1A1A;
  border: 1px solid rgba(237,224,200,0.07);
  border-radius: 20px;
  padding: 28px 24px;
  display: flex; flex-direction: column;
  justify-content: space-between;
  position: relative; overflow: hidden;
  transition: opacity 0.2s, transform 0.2s;
}
.card-box.animating { opacity: 0; transform: translateX(24px); }
.card-top-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 20px 20px 0 0; }
.card-type-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.card-type-icon { font-size: 18px; }
.card-type-name {
  font-family: 'Anton', sans-serif;
  font-size: 13px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7;
}
.card-hint { font-size: 11px; color: #6B5F52; font-style: italic; padding-left: 26px; }
.card-text {
  font-size: 21px; font-weight: 400; line-height: 1.55;
  text-align: center; padding: 0 4px;
  letter-spacing: -0.2px; color: #EDE0C8;
}
.card-spacer { min-height: 32px; }
.action-row { display: flex; gap: 10px; width: 100%; margin-top: 16px; }
.btn-next {
  flex: 1; padding: 16px;
  background: #EDE0C8;
  border-radius: 50px;
  color: #111111;
  font-family: 'Anton', sans-serif;
  font-size: 16px; letter-spacing: 2px; text-transform: uppercase;
  transition: background 0.2s;
}
.btn-next:hover { background: #F5EDD8; }
.btn-reveal {
  flex: 1; padding: 16px;
  border-radius: 50px;
  font-family: 'Anton', sans-serif;
  font-size: 16px; letter-spacing: 2px; text-transform: uppercase;
  transition: background 0.2s;
}
.guess-hint {
  font-size: 12px; text-align: center;
  margin-top: 10px; opacity: 0.7; letter-spacing: 0.3px;
}
.progress-track {
  width: 100%; height: 2px;
  background: rgba(237,224,200,0.06);
  border-radius: 1px; margin-top: 18px;
}
.progress-bar { height: 100%; border-radius: 1px; transition: width 0.4s ease; }

/* ── DONE ── */
.done-icon { font-size: 44px; margin-bottom: 16px; }
.done-title {
  font-family: 'Anton', sans-serif;
  font-size: 36px; letter-spacing: 1px; text-transform: uppercase;
  text-align: center; margin-bottom: 10px;
}
.done-sub { font-size: 14px; color: #9A8E7E; text-align: center; line-height: 1.6; }
.done-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 36px; }
.btn-replay {
  width: 100%; padding: 18px;
  background: #EDE0C8;
  border-radius: 50px;
  color: #111111;
  font-family: 'Anton', sans-serif;
  font-size: 18px; letter-spacing: 2px; text-transform: uppercase;
}
.btn-home-outline {
  width: 100%; padding: 16px;
  background: none;
  border: 1px solid rgba(237,224,200,0.12);
  border-radius: 50px;
  color: #9A8E7E;
  font-family: 'Anton', sans-serif;
  font-size: 16px; letter-spacing: 2px; text-transform: uppercase;
}

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200; align-items: center; justify-content: center;
  padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #1A1A1A;
  border: 1px solid rgba(237,224,200,0.1);
  border-radius: 20px; padding: 32px 28px;
  max-width: 380px; width: 100%;
}
.modal-title {
  font-family: 'Anton', sans-serif;
  font-size: 24px; letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 16px;
}
.modal-body { font-size: 14px; color: #9A8E7E; line-height: 1.8; }
.modal-body li { margin-bottom: 8px; list-style: none; padding-left: 0; }
.modal-close {
  width: 100%; padding: 14px;
  background: #EDE0C8; border-radius: 50px;
  color: #111; font-family: 'Anton', sans-serif;
  font-size: 15px; letter-spacing: 2px; text-transform: uppercase;
  margin-top: 24px;
}
.coming-soon { font-size: 13px; color: #6B5F52; text-align: center; margin-top: 10px; }
</style>
</head>
<body>
<button class="lang-toggle" id="langBtn" onclick="toggleLang()">SV</button>

<!-- Modal: How to Play -->
<div class="modal-overlay" id="howModal">
  <div class="modal-box">
    <div class="modal-title" id="howTitle"></div>
    <div class="modal-body" id="howBody"></div>
    <button class="modal-close" onclick="closeModal('howModal')">GOT IT</button>
  </div>
</div>

<!-- Modal: Card Packs -->
<div class="modal-overlay" id="packsModal">
  <div class="modal-box">
    <div class="modal-title">CARD PACKS</div>
    <div class="modal-body">
      <div style="margin-bottom:14px;color:#EDE0C8;">Available now:</div>
      <li>✦ &nbsp;After Hours (120 cards)</li>
      <br>
      <div style="margin-bottom:14px;color:#EDE0C8;">Coming soon:</div>
      <li style="opacity:0.4;">✦ &nbsp;First Dates</li>
      <li style="opacity:0.4;">✦ &nbsp;Long-Term Chaos</li>
      <li style="opacity:0.4;">✦ &nbsp;Spicy Night</li>
      <li style="opacity:0.4;">✦ &nbsp;Travel Mode</li>
    </div>
    <button class="modal-close" onclick="closeModal('packsModal')">CLOSE</button>
  </div>
</div>

<div id="app">
  <!-- Home -->
  <div class="screen" id="homeScreen">
    <div class="home-title">After Hours</div>
    <div class="home-subtitle" id="homeSubtitle"></div>
    <div class="card-fan">
      <svg viewBox="0 0 180 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Card 1 (far left) -->
        <g transform="rotate(-28 90 140)">
          <rect x="52" y="20" width="76" height="110" rx="10" fill="#1E1E1E" stroke="rgba(237,224,200,0.12)" stroke-width="1.5"/>

        </g>
        <!-- Card 2 -->
        <g transform="rotate(-14 90 140)">
          <rect x="52" y="20" width="76" height="110" rx="10" fill="#222222" stroke="rgba(237,224,200,0.14)" stroke-width="1.5"/>
          <rect x="60" y="32" width="60" height="86" rx="6" fill="#1A1A1A"/>
        </g>
        <!-- Card 3 (center) -->
        <g transform="rotate(0 90 140)">
          <rect x="52" y="20" width="76" height="110" rx="10" fill="#272727" stroke="rgba(237,224,200,0.18)" stroke-width="1.5"/>
          <rect x="60" y="32" width="60" height="86" rx="6" fill="#1E1E1E"/>
          <text x="90" y="82" font-family="Anton, sans-serif" font-size="22" fill="rgba(237,224,200,0.25)" text-anchor="middle">AH</text>
        </g>
        <!-- Card 4 -->
        <g transform="rotate(14 90 140)">
          <rect x="52" y="20" width="76" height="110" rx="10" fill="#222222" stroke="rgba(237,224,200,0.14)" stroke-width="1.5"/>
          <rect x="60" y="32" width="60" height="86" rx="6" fill="#1A1A1A"/>
        </g>
        <!-- Card 5 (far right) -->
        <g transform="rotate(28 90 140)">
          <rect x="52" y="20" width="76" height="110" rx="10" fill="#1E1E1E" stroke="rgba(237,224,200,0.12)" stroke-width="1.5"/>
          <rect x="60" y="32" width="60" height="86" rx="6" fill="#171717"/>
        </g>
      </svg>
    </div>
    <button class="btn-start" id="startBtn" onclick="showMoodSelect()"></button>
    <div class="home-nav">
      <button onclick="openModal('howModal')" id="howBtn"></button>
      <button onclick="openModal('packsModal')" id="packsBtn"></button>
    </div>
  </div>

  <!-- Mood Select -->
  <div class="screen hidden" id="moodScreen">
    <button class="mood-back" onclick="showHome()">&#8592; <span id="backLabel"></span></button>
    <div class="mood-heading" id="moodHeading"></div>
    <div class="mood-desc" id="moodDesc"></div>
    <div id="moodButtons" style="width:100%"></div>
  </div>

  <!-- Play -->
  <div class="screen hidden" id="playScreen">
    <div class="play-header">
      <button class="play-exit" id="exitBtn" onclick="goHome()"></button>
      <span class="play-counter" id="counter"></span>
      <span class="play-mood-tag" id="playMoodTag"></span>
    </div>
    <div class="card-box" id="cardBox">
      <div class="card-top-bar" id="cardBar"></div>
      <div>
        <div class="card-type-row">
          <span class="card-type-icon" id="typeIcon"></span>
          <span class="card-type-name" id="typeName"></span>
        </div>
        <p class="card-hint" id="typeHint"></p>
      </div>
      <p class="card-text" id="cardText"></p>
      <div class="card-spacer"></div>
    </div>
    <div class="action-row">
      <button class="btn-reveal hidden" id="revealBtn" onclick="reveal()"></button>
      <button class="btn-next" id="nextBtn" onclick="nextCard()"></button>
    </div>
    <p class="guess-hint hidden" id="guessHint"></p>
    <div class="progress-track">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <!-- Done -->
  <div class="screen hidden" id="doneScreen">
    <div class="done-icon">&#10024;</div>
    <div class="done-title" id="doneTitle"></div>
    <p class="done-sub" id="doneSub"></p>
    <div class="done-actions">
      <button class="btn-replay" id="replayBtn" onclick="replay()"></button>
      <button class="btn-home-outline" id="newMoodBtn" onclick="showHome()"></button>
    </div>
  </div>
</div>

<script>
// ── LANGUAGE ──
var lang = "en";

var UI = {

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.add('hidden'); });
  document.getElementById(id).classList.remove('hidden');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toggleLang() {
  lang = lang === "en" ? "sv" : "en";
  document.getElementById('langBtn').textContent = lang === "en" ? "SV" : "EN";
  var s = document.querySelector('.screen:not(.hidden)');
  if (s) {
    if (s.id === 'homeScreen') renderHome();
    else if (s.id === 'moodScreen') renderMoodSelect();
    else if (s.id === 'playScreen') renderCard();
    else if (s.id === 'doneScreen') renderDone();
  }
  // Update how-to modal
  renderHowModal();
}

function renderHome() {
  var ux = u();
  document.getElementById('homeSubtitle').textContent = ux.subtitle;
  document.getElementById('startBtn').textContent = ux.startBtn;
  document.getElementById('howBtn').textContent = ux.howBtn;
  document.getElementById('packsBtn').textContent = ux.packsBtn;
  renderHowModal();
}

function renderHowModal() {
  var ux = u();
  document.getElementById('howTitle').textContent = ux.howTitle;
  document.getElementById('howBody').innerHTML = ux.howBody.map(function(line){
    return '<li>' + line + '</li>';
  }).join('');
}

function showHome() { renderHome(); showScreen('homeScreen'); }
function showMoodSelect() { renderMoodSelect(); showScreen('moodScreen'); }

function renderMoodSelect() {
  var ux = u();
  document.getElementById('backLabel').textContent = ux.backLabel;
  document.getElementById('moodHeading').textContent = ux.moodHeading;
  document.getElementById('moodDesc').textContent = ux.moodDesc;
  var html = "";
  var keys = ["fun","deep","spicy","mix"];
  for (var i=0; i<keys.length; i++) {
    var k = keys[i];
    var m = ux.moods[k];
    var count = k === "mix" ? CARDS.length : CARDS.filter(function(c){ return c.mood === k; }).length;
    var col = MOOD_COLORS[k];
    html += '<button class="mood-btn" onclick="startGame(\''+k+'\')" style="border-color:'+col+'18;">';
    html += '<span class="m-emoji">'+m.emoji+'</span>';
    html += '<div class="m-info"><div class="m-name" style="color:'+col+'">'+m.label+'</div><div class="m-desc">'+m.desc+'</div></div>';
    html += '<span class="m-count">'+count+' '+ux.cards+'</span>';
    html += '</button>';
  }
  document.getElementById('moodButtons').innerHTML = html;
}

function startGame(mood) {
  currentMood = mood;
  var filtered = mood === "mix" ? CARDS : CARDS.filter(function(c){ return c.mood === mood; });
  deck = shuffle(filtered);
  idx = 0; revealed = false;
  renderCard();
  showScreen('playScreen');
}

function goHome() { showHome(); showScreen('homeScreen'); }

function renderCard() {
  var ux = u();
  var card = deck[idx];
  var meta = ux.types[card.type];
  var color = MOOD_COLORS[currentMood];
  var moodInfo = ux.moods[currentMood];
  var isGuess = card.type === "guess_your_partner";

  document.getElementById('exitBtn').textContent = ux.exit;
  document.getElementById('counter').textContent = (idx+1) + " / " + deck.length;
  document.getElementById('playMoodTag').textContent = moodInfo.emoji + " " + moodInfo.label;
  document.getElementById('playMoodTag').style.color = color;
  document.getElementById('cardBar').style.background = "linear-gradient(90deg,"+color+"99,transparent)";
  document.getElementById('typeIcon').textContent = meta.icon;
  document.getElementById('typeName').textContent = meta.label;
  document.getElementById('typeName').style.color = color;
  document.getElementById('typeHint').textContent = meta.hint;
  document.getElementById('cardText').textContent = ct(card);

  var revBtn = document.getElementById('revealBtn');
  var nxtBtn = document.getElementById('nextBtn');
  var gHint = document.getElementById('guessHint');

  if (isGuess && !revealed) {
    revBtn.classList.remove('hidden');
    revBtn.textContent = ux.reveal;
    revBtn.style.background = color + "22";
    revBtn.style.border = "1.5px solid " + color + "44";
    revBtn.style.color = color;
    nxtBtn.classList.add('hidden');
    gHint.classList.remove('hidden');
    gHint.textContent = ux.guessWait;
    gHint.style.color = "#6B5F52";
  } else {
    revBtn.classList.add('hidden');
    nxtBtn.classList.remove('hidden');
    nxtBtn.textContent = ux.next;
    if (isGuess && revealed) {
      gHint.classList.remove('hidden');
      gHint.textContent = ux.guessReveal;
      gHint.style.color = color;
    } else {
      gHint.classList.add('hidden');
    }
  }

  var bar = document.getElementById('progressBar');
  bar.style.width = ((idx+1)/deck.length*100)+"%";
  bar.style.background = "linear-gradient(90deg,"+color+"88,"+color+"33)";
}

function reveal() { revealed = true; renderCard(); }

function nextCard() {
  var box = document.getElementById('cardBox');
  box.classList.add('animating');
  setTimeout(function(){
    if (idx+1 >= deck.length) { renderDone(); showScreen('doneScreen'); }
    else { idx++; revealed = false; renderCard(); }
    box.classList.remove('animating');
  }, 180);
}

function renderDone() {
  var ux = u();
  var moodInfo = ux.moods[currentMood];
  document.getElementById('doneTitle').textContent = ux.doneTitle;
  document.getElementById('doneSub').textContent = ux.doneSub(deck.length);
  document.getElementById('replayBtn').textContent = ux.replay(moodInfo.label);
  document.getElementById('newMoodBtn').textContent = ux.newMood;
}

function replay() { startGame(currentMood); }

// Init
renderHome();
</script>
</body>
</html>
